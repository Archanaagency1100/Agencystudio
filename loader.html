<div id="agency-loader">
  <div class="gold-streak"></div>

  <div class="camera-wrap">
    <div class="particles">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="camera">
      <div class="top"></div>
      <div class="body">
        <div class="viewfinder"></div>
        <div class="lens">
          <div class="lens-ring"></div>
          <div class="glass"></div>

          <div class="shutter">
            <i></i><i></i><i></i><i></i><i></i><i></i>
          </div>
        </div>
      </div>
    </div>

    <div class="flash"></div>
  </div>
</div>

<style>
#agency-loader {
  position: fixed;
  inset: 0;
  background: #030303;
  z-index: 999999;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.gold-streak {
  position: absolute;
  width: 45vw;
  height: 3px;
  left: -50vw;
  top: 50%;
  background: linear-gradient(90deg, transparent, #ffcc33, #fff0a6, transparent);
  filter: blur(1px);
  box-shadow: 0 0 25px #ffcc33, 0 0 60px rgba(255, 204, 51, 0.8);
  animation: streakMove 3s ease-in-out infinite;
}

.camera-wrap {
  position: relative;
  width: 220px;
  height: 150px;
  animation: floatCam 3s ease-in-out infinite;
}

.camera {
  position: absolute;
  inset: 0;
  opacity: 0;
  transform: scale(0.6);
  animation: cameraAssemble 3s ease-in-out infinite;
}

.body {
  position: absolute;
  bottom: 15px;
  left: 20px;
  width: 180px;
  height: 95px;
  border-radius: 18px;
  background: linear-gradient(145deg, #171717, #050505);
  border: 2px solid #d9a61f;
  box-shadow:
    0 0 20px rgba(255, 198, 45, 0.35),
    inset 0 0 18px rgba(255, 198, 45, 0.12);
}

.top {
  position: absolute;
  top: 18px;
  left: 58px;
  width: 105px;
  height: 40px;
  background: linear-gradient(145deg, #1c1c1c, #060606);
  border: 2px solid #d9a61f;
  border-radius: 12px 12px 6px 6px;
  box-shadow: 0 0 15px rgba(255, 198, 45, 0.25);
}

.viewfinder {
  position: absolute;
  top: 18px;
  left: 24px;
  width: 34px;
  height: 18px;
  border-radius: 4px;
  background: #080808;
  border: 1px solid #ffcc33;
  box-shadow: inset 0 0 10px rgba(255, 204, 51, 0.3);
}

.lens {
  position: absolute;
  width: 82px;
  height: 82px;
  border-radius: 50%;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, #050505 30%, #151515 55%, #d9a61f 58%, #050505 70%);
  box-shadow:
    0 0 22px rgba(255, 204, 51, 0.55),
    inset 0 0 18px rgba(255, 204, 51, 0.25);
  animation: lensRotate 3s ease-in-out infinite;
}

.lens-ring {
  position: absolute;
  inset: 9px;
  border-radius: 50%;
  border: 2px dashed #ffcc33;
  opacity: 0.7;
}

.glass {
  position: absolute;
  inset: 22px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #fff4b0, #d9a61f 25%, #050505 70%);
  opacity: 0.9;
}

.shutter {
  position: absolute;
  inset: 18px;
  border-radius: 50%;
  overflow: hidden;
  animation: shutterPulse 3s ease-in-out infinite;
}

.shutter i {
  position: absolute;
  width: 50%;
  height: 50%;
  background: #050505;
  left: 50%;
  top: 50%;
  transform-origin: 0 0;
  opacity: 0.75;
}

.shutter i:nth-child(1) { transform: rotate(0deg) skewY(30deg); }
.shutter i:nth-child(2) { transform: rotate(60deg) skewY(30deg); }
.shutter i:nth-child(3) { transform: rotate(120deg) skewY(30deg); }
.shutter i:nth-child(4) { transform: rotate(180deg) skewY(30deg); }
.shutter i:nth-child(5) { transform: rotate(240deg) skewY(30deg); }
.shutter i:nth-child(6) { transform: rotate(300deg) skewY(30deg); }

.flash {
  position: absolute;
  inset: 50%;
  width: 20px;
  height: 20px;
  background: #fff3a3;
  border-radius: 50%;
  transform: translate(-50%, -50%) scale(0);
  opacity: 0;
  box-shadow:
    0 0 40px #fff3a3,
    0 0 100px #ffcc33,
    0 0 220px rgba(255, 204, 51, 0.9);
  animation: cameraFlash 3s ease-in-out infinite;
}

.particles span {
  position: absolute;
  width: 5px;
  height: 5px;
  background: #ffcc33;
  border-radius: 50%;
  box-shadow: 0 0 15px #ffcc33;
  opacity: 0;
  animation: particleMove 3s ease-in-out infinite;
}

.particles span:nth-child(1) { left: -30px; top: 30px; animation-delay: .1s; }
.particles span:nth-child(2) { left: 10px; top: -20px; animation-delay: .2s; }
.particles span:nth-child(3) { right: -20px; top: 25px; animation-delay: .3s; }
.particles span:nth-child(4) { left: 30px; bottom: -15px; animation-delay: .4s; }
.particles span:nth-child(5) { right: 20px; bottom: -20px; animation-delay: .5s; }
.particles span:nth-child(6) { left: -45px; bottom: 35px; animation-delay: .6s; }
.particles span:nth-child(7) { right: -45px; bottom: 40px; animation-delay: .7s; }
.particles span:nth-child(8) { left: 70px; top: -35px; animation-delay: .8s; }
.particles span:nth-child(9) { right: 70px; bottom: -35px; animation-delay: .9s; }
.particles span:nth-child(10) { left: 100px; top: 50%; animation-delay: 1s; }

@keyframes streakMove {
  0% { left: -55vw; opacity: 0; }
  20% { opacity: 1; }
  45% { left: 28vw; opacity: 1; }
  70% { opacity: 0; }
  100% { left: 110vw; opacity: 0; }
}

@keyframes cameraAssemble {
  0% { opacity: 0; transform: scale(0.55) rotate(-4deg); filter: blur(6px); }
  28% { opacity: 1; transform: scale(1.04) rotate(0deg); filter: blur(0); }
  55% { opacity: 1; transform: scale(1); }
  78% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.92); }
}

@keyframes lensRotate {
  0% { transform: translate(-50%, -50%) rotate(0deg) scale(0.7); }
  38% { transform: translate(-50%, -50%) rotate(180deg) scale(1); }
  70% { transform: translate(-50%, -50%) rotate(360deg) scale(1); }
  100% { transform: translate(-50%, -50%) rotate(420deg) scale(0.9); }
}

@keyframes shutterPulse {
  0%, 45% { transform: scale(0.15) rotate(0deg); opacity: 0.2; }
  58% { transform: scale(1) rotate(90deg); opacity: 0.9; }
  72% { transform: scale(0.35) rotate(160deg); opacity: 0.3; }
  100% { transform: scale(0.15) rotate(220deg); opacity: 0.1; }
}

@keyframes cameraFlash {
  0%, 55% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
  62% { opacity: 1; transform: translate(-50%, -50%) scale(10); }
  75% { opacity: 0; transform: translate(-50%, -50%) scale(18); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
}

@keyframes particleMove {
  0% { opacity: 0; transform: translate(0, 0) scale(0); }
  20% { opacity: 1; transform: translate(40px, 25px) scale(1); }
  45% { opacity: 1; transform: translate(90px, 55px) scale(0.8); }
  70% { opacity: 0; transform: translate(110px, 75px) scale(0); }
  100% { opacity: 0; }
}

@keyframes floatCam {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* Optional: hide loader after website loads */
body.loaded #agency-loader {
  opacity: 0;
  visibility: hidden;
  transition: 0.8s ease;
}
</style>

<script>
window.addEventListener("load", function () {
  setTimeout(function () {
    document.body.classList.add("loaded");
  }, 3000);
});
</script>
