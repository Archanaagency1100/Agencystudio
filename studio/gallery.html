let filteredWorks = [...gallery];
let currentLightboxIndex = 0;

function renderGallery(itemsToRender) {
    const galleryMarkup = itemsToRender.map((item, index) => `
        <div class="gallery-item ${item.category}">
            <div class="position-relative overflow-hidden rounded-1 border border-dark bg-dark">
                <img src="${item.img}" alt="${item.name}" class="img-fluid w-100 d-block" onclick="openLightbox(${index})">
           
            </div>
        </div>
    `).join('');

    // Inject elements smoothly directly into the masonry grid pipeline
    galleryTrack.innerHTML = galleryMarkup;
}

// Initial render call track pipeline
renderGallery(gallery);

// 3. Standard Failsafe Filtering Processing Core Logic Action
function filterGallery(category) {
    const buttons = document.querySelectorAll('.filter-btn');
    buttons.forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('onclick').includes(category));
    });

    const items = document.querySelectorAll('.gallery-item');
    items.forEach(item => {
        if (category === 'all' || item.classList.contains(category)) {
            item.style.display = "inline-block";
            setTimeout(() => { item.style.opacity = "1"; item.style.transform = "scale(1)"; }, 10);
        } else {
            item.style.opacity = "0"; item.style.transform = "scale(0.96)";
            setTimeout(() => { item.style.display = "none"; }, 350);
        }
    });

    // Update the local tracker variable for lightbox navigation logic track execution
    filteredWorks = category === 'all' ? [...gallery] : gallery.filter(item => item.category === category);
}

// 4. Cinematic Lightbox Controller Lifecycle Pipeline

const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const lightboxCaption = document.getElementById("lightbox-caption");

// Open Lightbox
function openLightbox(index) {
    currentLightboxIndex = index;
    updateLightboxContent();
    lightbox.classList.remove("d-none");
    setTimeout(() => {
        lightbox.classList.add("d-flex");
    }, 10);
}

// Close Lightbox
function closeLightbox() {
    lightbox.classList.remove("d-flex");
    setTimeout(() => {
        lightbox.classList.add("d-none");
    }, 400); 
}

// Navigate Lightbox (Previous/Next)
function changeLightboxImage(direction) {
    currentLightboxIndex = (currentLightboxIndex + direction + filteredWorks.length) % filteredWorks.length;
    updateLightboxContent();
}

// Update Lightbox Content
function updateLightboxContent() {
    const imageData = filteredWorks[currentLightboxIndex];
    lightboxImg.src = imageData.img;
    lightboxImg.alt = imageData.name;
    // lightboxCaption.textContent = imageData.name.toUpperCase();
}

// Event Listeners initialization controller track execution pipeline
document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
document.getElementById("lightbox-prev").addEventListener("click", () => changeLightboxImage(-1));
document.getElementById("lightbox-next").addEventListener("click", () => changeLightboxImage(1));

// Keyboard Navigation support
document.addEventListener("keydown", (e) => {
    if (lightbox.classList.contains("d-flex")) {
        if (e.key === "Escape") closeLightbox();
        if (e.key === "ArrowLeft") changeLightboxImage(-1);
        if (e.key === "ArrowRight") changeLightboxImage(1);
    }
});

// Close lightbox on clicking the blurred background layer mask
lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox || e.target.closest('.lightbox-content-wrapper') && !e.target.closest('.position-relative')) {
        closeLightbox();
    }
});
