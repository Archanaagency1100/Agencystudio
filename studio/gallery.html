<head>

 <link rel="stylesheet" href="../assets/css/global.css">

</head>
<body>
   <div id="nav-placeholder"></div>
  <section id="get-in-touch" class="pt-5 mt-lg-4 text-white bg-dark get-in-touch-bg">
    <div class="container py-5 my-md-3">
        <div class="row">
            
            <div class="col-12 col-md-8 col-lg-6 ps-4 ps-md-5">
                
                <p class="text-uppercase text-accent fw-bold mb-2 tracking-wider" 
                   >
                   BEHIND THE SCENES <br>
                   BEYOND IMAGINATION
                </p>
                
                <h2 class="display-1 fw-bold text-uppercase lh-1 mb-3 get-in-touch-title">
                  OUR WORK IN ACTION
                </h2>
                
                <p class="text-secondary fs-5 col-11 col-md-12">
                   A glimpse into our studio's creative process, showcasing the magic that happens behind the scenes. From concept to creation, witness the artistry and innovation that bring our projects to life.
                </p>
                
            </div>
            
        </div>
    </div>
</section>
<!-- -------------agllery section-------------- -->
<section id="studio-gallery" class="py-5 bg-black text-white position-relative overflow-hidden">
    <div class="container-fluid px-4 px-md-5">
        
        <div class="d-flex flex-wrap align-items-center justify-content-between border border-dark rounded-pill px-4 py-2 mb-5 mx-auto layout-filter-nav" style="background: #0c0c0e; max-width: 900px;">
            <div class="d-flex flex-wrap gap-2 gap-md-3">
                <button class="btn filter-btn active text-uppercase small fw-bold px-3 py-1 rounded-pill" onclick="filterGallery('all')">All</button>
                <button class="btn filter-btn text-uppercase small fw-medium px-3 py-1 rounded-pill" onclick="filterGallery('bts')">BTS</button>
                <button class="btn filter-btn text-uppercase small fw-medium px-3 py-1 rounded-pill" onclick="filterGallery('photoshoots')">Photoshoots</button>
                <button class="btn filter-btn text-uppercase small fw-medium px-3 py-1 rounded-pill" onclick="filterGallery('podcast')">Podcast</button>
                <button class="btn filter-btn text-uppercase small fw-medium px-3 py-1 rounded-pill" onclick="filterGallery('music-videos')">Music Videos</button>
                <button class="btn filter-btn text-uppercase small fw-medium px-3 py-1 rounded-pill" onclick="filterGallery('commercials')">Commercials</button>
                <button class="btn filter-btn text-uppercase small fw-medium px-3 py-1 rounded-pill" onclick="filterGallery('events')">Events</button>
            </div>
       
        </div>

        <div class="gallery-masonry-grid" id="masonry-gallery-track">
            </div>

    </div>
</section>

<div class="lightbox-modal d-none" id="lightbox">
    
    <button class="lightbox-btn lightbox-close" id="lightbox-close">
        <i class="fa-solid fa-xmark"></i>
    </button>
    <button class="lightbox-btn lightbox-prev" id="lightbox-prev">
        <i class="fa-solid fa-chevron-left"></i>
    </button>
    <button class="lightbox-btn lightbox-next" id="lightbox-next">
        <i class="fa-solid fa-chevron-right"></i>
    </button>

    <div class="lightbox-content-wrapper h-100 d-flex align-items-center justify-content-center">
        <div class="position-relative text-center">
            <img src="" alt="" class="img-fluid lightbox-image shadow-lg" id="lightbox-img">
            <p class="lightbox-caption m-0 mt-3 small text-uppercase text-white tracking-widest" id="lightbox-caption"></p>
        </div>
    </div>
</div>



<div id="footer-placeholder"></div>


</body>
<script>

// Target tracking nodes
const galleryTrack = document.getElementById("masonry-gallery-track");

// 1. Paste your works collection data structure array here (Example entries)
const works = [
    { img: "../assets/img/Agency Gallery/BTS/1.jpg",  category: "bts" },
    { img: "../assets/img/Agency Gallery/BTS/2.jpg",  category: "bts" },
    { img: "../assets/img/Agency Gallery/BTS/3.jpg",  category: "bts" },
    { img: "../assets/img/Agency Gallery/BTS/444.jpg",  category: "bts" },
    { img: "../assets/img/Agency Gallery/BTS/55555.jpg",  category: "bts" },


];

let filteredWorks = [...works];
let currentLightboxIndex = 0;

function renderGallery(itemsToRender) {
    const galleryMarkup = itemsToRender.map((item, index) => `
        <div class="gallery-item ${item.category}">
            <div class="position-relative overflow-hidden rounded-1 border border-dark bg-dark">
                <img src="${item.img}" alt="${item.name}" class="img-fluid w-100 d-block" onclick="openLightbox(${index})">
           
            </div>
        </div>
    `).join('');

    // Inject elements smoothly directly into the masonry grid pipeline
    galleryTrack.innerHTML = galleryMarkup;
}

// Initial render call track pipeline
renderGallery(works);

// 3. Standard Failsafe Filtering Processing Core Logic Action
function filterGallery(category) {
    const buttons = document.querySelectorAll('.filter-btn');
    buttons.forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('onclick').includes(category));
    });

    const items = document.querySelectorAll('.gallery-item');
    items.forEach(item => {
        if (category === 'all' || item.classList.contains(category)) {
            item.style.display = "inline-block";
            setTimeout(() => { item.style.opacity = "1"; item.style.transform = "scale(1)"; }, 10);
        } else {
            item.style.opacity = "0"; item.style.transform = "scale(0.96)";
            setTimeout(() => { item.style.display = "none"; }, 350);
        }
    });

    // Update the local tracker variable for lightbox navigation logic track execution
    filteredWorks = category === 'all' ? [...works] : works.filter(item => item.category === category);
}

// 4. Cinematic Lightbox Controller Lifecycle Pipeline

const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const lightboxCaption = document.getElementById("lightbox-caption");

// Open Lightbox
function openLightbox(index) {
    currentLightboxIndex = index;
    updateLightboxContent();
    lightbox.classList.remove("d-none");
    setTimeout(() => {
        lightbox.classList.add("d-flex");
    }, 10);
}

// Close Lightbox
function closeLightbox() {
    lightbox.classList.remove("d-flex");
    setTimeout(() => {
        lightbox.classList.add("d-none");
    }, 400); 
}

// Navigate Lightbox (Previous/Next)
function changeLightboxImage(direction) {
    currentLightboxIndex = (currentLightboxIndex + direction + filteredWorks.length) % filteredWorks.length;
    updateLightboxContent();
}

// Update Lightbox Content
function updateLightboxContent() {
    const imageData = filteredWorks[currentLightboxIndex];
    lightboxImg.src = imageData.img;
    lightboxImg.alt = imageData.name;
    // lightboxCaption.textContent = imageData.name.toUpperCase();
}

// Event Listeners initialization controller track execution pipeline
document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
document.getElementById("lightbox-prev").addEventListener("click", () => changeLightboxImage(-1));
document.getElementById("lightbox-next").addEventListener("click", () => changeLightboxImage(1));

// Keyboard Navigation support
document.addEventListener("keydown", (e) => {
    if (lightbox.classList.contains("d-flex")) {
        if (e.key === "Escape") closeLightbox();
        if (e.key === "ArrowLeft") changeLightboxImage(-1);
        if (e.key === "ArrowRight") changeLightboxImage(1);
    }
});

// Close lightbox on clicking the blurred background layer mask
lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox || e.target.closest('.lightbox-content-wrapper') && !e.target.closest('.position-relative')) {
        closeLightbox();
    }
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
