<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Development</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/studio.css">
    
    <style>
        /* Modern CSS Reset & Minimal Variables */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #141416 0%, #08080a 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Container Card */
        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            max-width: 500px;
            width: 100%;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        /* Tag Label & Pulse */
        .status-tag {
            color: #ffcc00;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .pulse-dot {
            width: 7px;
            height: 7px;
            background-color: #ffcc00;
            border-radius: 50%;
            margin-right: 8px;
            position: relative;
        }

        .pulse-dot::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #ffcc00;
            border-radius: 50%;
            top: 0;
            left: 0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(3.5); opacity: 0; }
        }

        /* Typography styling */
        h1 {
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: -0.5px;
            margin-bottom: 15px;
            color: #f5f5f7;
        }

        h1 span {
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #a1a1a6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.main-text {
            color: #a1a1a6;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        hr {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent);
            margin: 25px auto;
            width: 50%;
        }

        p.sub-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        /* Back to Home Link Styling */
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .back-link i {
            transition: transform 0.3s ease;
        }

        .back-link:hover {
            color: #ffcc00;
        }

        .back-link:hover i {
            transform: translateX(-4px);
        }

        /* Smooth Mobile Adjustments */
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
            p.main-text {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="status-tag">
            <span class="pulse-dot"></span> Studio Update
        </div>

        <h1>Website <span>Expanding</span></h1>
        <p class="main-text">
            This page is currently under development as we expand the website experience.
        </p>

        <hr>

        <p class="sub-text">
            Need immediate assistance?<br>Reach out to our team directly.
        </p>
        
        <a href="tel:+919811301100" class="btn-contact text-accent linking">
           <i class="fa-solid fa-phone text-accent me-1"></i>  +91 98113 01100
        </a>

        <br>

        <a href="/studio/" class="back-link">
            <i class="fa-solid fa-arrow-left me-2"></i> Back to Studio Page
        </a>
    </div>

</body>
<script src="/assets/js/studio.js"></script>
</html>
