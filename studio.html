<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgencyEleven100 Studio | Production Excellence</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #050505;
            --accent-yellow: #e5b400;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }

        /* --- 1. CINEMATIC SHUTTER PRELOADER --- */
        .cinematic-loader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1), opacity 1s ease;
        }

        .studio-setup { text-align: center; position: relative; }

        .camera-icon {
            font-size: 6rem;
            color: #fff;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 30px rgba(229, 180, 0, 0.4));
            animation: cameraEntrance 1s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards;
        }

        .loader-text {
            font-family: 'Impact', sans-serif;
            font-size: clamp(2rem, 5vw, 4rem);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 10px 0;
            transition: color 0.3s ease;
        }

        .sub-text {
            font-size: 0.8rem;
            letter-spacing: 6px;
            color: var(--accent-yellow);
            font-weight: bold;
            text-transform: uppercase;
        }

        .shutter-flash {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 100000;
            opacity: 0;
            pointer-events: none;
        }

        /* --- 2. MAIN CONTENT REVEAL EFFECT --- */
        #main-wrapper {
            opacity: 0;
            transform: scale(0.9);
            transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #main-wrapper.reveal {
            opacity: 1;
            transform: scale(1);
        }

        /* --- 3. HERO & MARQUEE STYLES --- */
        .hero-section {
            height: 90vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&q=80&w=2071') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero-title { font-family: 'Impact', sans-serif; font-size: clamp(3rem, 10vw, 6rem); line-height: 0.9; }

        /* MARQUEE HARDWARE ACCELERATION */
        .slider-wrapper { overflow: hidden; width: 100%; position: relative; contain: paint; margin-bottom: 50px; }
        .scroll-track { display: flex !important; width: max-content !important; transform: translate3d(0, 0, 0); }
        
        #gallery, #brand_logo {
            display: flex !important;
            flex-wrap: nowrap !important;
            animation: scroll 100s linear infinite;
        }

        .box2 {
            width: 240px; height: 180px;
            background: #111;
            margin: 0 10px;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .box2 img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(20%); transition: 0.5s; }
        .box2:hover img { filter: grayscale(0%); transform: scale(1.1); }

        /* --- ANIMATIONS --- */
        @keyframes cameraEntrance { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes cameraFlash { 0% { opacity: 0; } 40% { opacity: 1; } 100% { opacity: 0; } }
        @keyframes scroll { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-50%, 0, 0); } }

        .flash-active { animation: cameraFlash 0.6s ease-out forwards; }
        .loader-exit { transform: scale(2); opacity: 0; pointer-events: none; }

        .yellow-btn {
            background: var(--accent-yellow);
            color: #000;
            padding: 15px 40px;
            font-weight: 900;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 5px;
            display: inline-block;
            transition: 0.3s;
        }
        .yellow-btn:hover { background: #fff; transform: translateY(-3px); }
    </style>
</head>
<body>

    <!-- 1. CINEMATIC PRELOADER -->
    <div id="page-loader" class="cinematic-loader">
        <div class="studio-setup">
            <div class="camera-icon">
                <i class="fa-solid fa-camera-viewfinder"></i>
            </div>
            
            <div id="text-container">
                <h2 class="loader-text" id="main-msg">SMILE PLEASE</h2>
                <p class="sub-text">You are on AgencyEleven100 Studio</p>
            </div>
        </div>
        <div class="shutter-flash" id="flash"></div>
    </div>

    <!-- 2. MAIN WEBSITE -->
    <div id="main-wrapper">
        <!-- Hero -->
        <section class="hero-section">
            <div class="container">
                <p class="text-accent fw-bold mb-3" style="letter-spacing: 10px;">ACTION | PASSION | STUDIO</p>
                <h1 class="hero-title">DIRECTING<br>YOUR <span class="text-accent">VISION</span></h1>
                <p class="lead text-white-50 mb-5">High-end production services for modern brands.</p>
                <a href="#" class="yellow-btn">Book Session</a>
            </div>
        </section>

        <!-- Sliders -->
        <div class="py-5">
            <h5 class="text-center text-accent mb-4" style="letter-spacing: 5px;">TRUSTED BY ARTISTS</h5>
            <div class="slider-wrapper"><div class="scroll-track" id="gallery"></div></div>

            <h5 class="text-center text-accent mb-4" style="letter-spacing: 5px;">TRUSTED BY BRANDS</h5>
            <div class="slider-wrapper"><div class="scroll-track" id="brand_logo"></div></div>
        </div>
    </div>

    <!-- Shutter Sound -->
    <audio id="shutter-sound" preload="auto">
        <source src="https://www.soundjay.com/mechanical/camera-shutter-click-01.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- 1. SLIDER DATA ---
        const artists = [
            { img: "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?q=80&w=400" },
            { img: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?q=80&w=400" },
            { img: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?q=80&w=400" },
            { img: "https://images.unsplash.com/photo-1514525253361-bee871871771?q=80&w=400" },
            { img: "https://images.unsplash.com/photo-1493225255756-d9584f8606e9?q=80&w=400" }
        ];

        function populateSlider(id, data) {
            const container = document.getElementById(id);
            const html = data.map(item => `<div class="box2"><img src="${item.img}"></div>`).join('');
            container.innerHTML = html + html; // Double for seamless loop
        }

        populateSlider('gallery', artists);
        populateSlider('brand_logo', artists); // Re-using data for demo

        // --- 2. CINEMATIC LOGIC ---
        window.addEventListener('load', function() {
            const loader = document.getElementById('page-loader');
            const flash = document.getElementById('flash');
            const mainMsg = document.getElementById('main-msg');
            const subMsg = document.querySelector('.sub-text');
            const sound = document.getElementById('shutter-sound');
            const wrapper = document.getElementById('main-wrapper');

            // Wait 2.5 seconds to ensure user sees the "Smile Please"
            setTimeout(() => {
                // Play Shutter Sound
                sound.play().catch(() => console.log("Sound muted by browser policy"));
                
                // Trigger Shutter Flash
                flash.classList.add('flash-active');

                // Swap Text during the white-out (0.2s into flash)
                setTimeout(() => {
                    mainMsg.innerText = "THANK YOU";
                    mainMsg.style.color = "#e5b400";
                    subMsg.innerText = "EXPLORE THE STUDIO EXPERIENCE";
                }, 200);

                // Exit Loader & Reveal Content
                setTimeout(() => {
                    loader.classList.add('loader-exit');
                    wrapper.classList.add('reveal');
                }, 1500);

            }, 2500);
        });
    </script>
</body>
</html>
