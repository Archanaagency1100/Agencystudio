<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ==========================================================================
         OFFICIAL SEO METADATA MATRIX (PRATISHTHA OFFICE SPECIFICATIONS APPROVED)
         ========================================================================== -->
    <title>Portfolio | Film Production, Branding, Photography & Web Development | AgencyEleven100</title>
    <meta name="description" content="Explore our portfolio of websites, film production, branding, photography, and graphic design projects created for brands, businesses, and creators.">
    <meta name="keywords" content="Creative Agency Portfolio, Film Production Portfolio, Branding Projects, Photography Portfolio, Web Development Portfolio">
    
    <!-- Open Graph / Facebook Share Parameters -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://1100.in/agency/portfolio">
    <meta property="og:title" content="Portfolio | Film Production, Branding, Photography & Web Development | AgencyEleven100">
    <meta property="og:description" content="Explore our portfolio of websites, film production, branding, photography, and graphic design projects created for brands, businesses, and creators.">
    <meta property="og:image" content="https://1100.in/assets/img/portfolio-og.jpg">

    <!-- Twitter Rich Content Engine Parameters -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://1100.in/agency/portfolio">
    <meta property="twitter:title" content="Portfolio | Film Production, Branding, Photography & Web Development | AgencyEleven100">
    <meta property="twitter:description" content="Explore our portfolio of websites, film production, branding, photography, and graphic design projects created for brands, businesses, and creators.">
    <meta property="twitter:image" content="https://1100.in/assets/img/portfolio-og.jpg">

    <link rel="canonical" href="https://1100.in/agency/portfolio">
    
    <!-- Global External Libs & Icon Fonts -->
    <link rel="shortcut icon" href="1100.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Great+Vibes&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <header id="nav-placeholder"></header>

    <!-- ==========================================================================
         PORTFOLIO SECTION SHOWCASE VIEWPORT
         ========================================================================== -->
    <section class="agency-portfolio py-5">
        <div class="container text-center my-5">
            <h2 class="portfolio-main-title">FEATURED PROJECTS</h2>
            <p class="portfolio-lead text-muted mx-auto">Explore our portfolio of websites, film production, branding, photography, and graphic design projects created for brands, businesses, and creators.</p>
            
            <div class="filter-nav d-flex flex-wrap justify-content-center mt-4 gap-2">
                <button class="filter-btn active" data-filter="all">ALL</button>
                <button class="filter-btn" data-filter="websites">UI/UX</button>
                <button class="filter-btn" data-filter="films">FILMS</button>
                <button class="filter-btn" data-filter="branding">BRANDING</button>
                <!-- <button class="filter-btn" data-filter="photography">PHOTOGRAPHY</button> -->
            </div>
        </div>

        <!-- Fully Open Fluid Canvas - Removes Bootstrap Max-Width Limits -->
        <div class="portfolio-full-bleed-container">
            <div class="portfolio-grid" id="dynamic-portfolio-grid"></div>
        </div>
    </section>

    <!-- ==========================================================================
         LUXURY ULTRA-SCROLL ASSET PREVIEW LIGHTBOX MODAL (YOUR SPECIFICATIONS)
         ========================================================================== -->
    <div id="portfolioAssetModal" class="portfolio-modal-wrapper" onclick="closePortfolioModal()">
        <div class="portfolio-modal-content" onclick="event.stopPropagation()">
            <span class="portfolio-modal-close" onclick="closePortfolioModal()">&times;</span>
            <div class="portfolio-modal-body">
                <div class="modal-img-container">
                    <img id="modalPreviewImg" src="" alt="Portfolio Media Grid Preview">
                </div>
                <h3 id="modalAssetTitle"></h3>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <!-- Script Pipelines -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
    <script src="/assets/js/agency.js"></script>
    <script src="/assets/js/projects.js"></script>
</body>
</html>
